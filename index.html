<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fullscreen Portrait Video AR</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        /* Force body to take up full screen with no scrolling */
        body, html {
            margin: 0;
            padding: 0;
            width: 80%;
            height: 80%;
            overflow: hidden;
        }

        /* Splash screen button setup to unlock audio */
        #splash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 99999;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #startButton {
            padding: 20px 40px;
            font-size: 20px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #28a745;
            color: white;
            font-weight: bold;
        }
    </style>

    <script>
        // Critical for audio: modern browsers block sound until a user taps the screen
        window.addEventListener('load', () => {
            const splash = document.querySelector('#splash');
            const startButton = document.querySelector('#startButton');
            const video = document.querySelector("#promoVideo");

            startButton.addEventListener('click', () => {
                splash.style.display = 'none';
                
                // Programmatically play and pause once to unlock the audio stream
                video.play().then(() => {
                    video.pause();
                    video.currentTime = 0;
                }).catch(err => console.log("Audio device initialization failed:", err));
            });
        });

        AFRAME.registerComponent('video-handler', {
            init: function () {
                var marker = this.el;
                var video = document.querySelector("#promoVideo");

                marker.addEventListener('targetFound', function () {
                    video.muted = false; // Double-check audio is unmuted
                    video.play().catch(e => console.log("Playback error: ", e));
                });

                marker.addEventListener('targetLost', function () {
                    video.pause();
                });
            }
        });
    </script>
</head>
<body>

    <div id="splash">
        <button id="startButton">Scan Image (With Audio)</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="promoVideo" src="./promo.mp4" preload="auto" loop="true" response-type="arraybuffer" crossorigin="anonymous" playsinline webkit-playsinline></video>
        </a-assets>
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" video-handler>
            <a-video src="#promoVideo" position="0 0 0" width="2.25" height="4" rotation="0 0 0"></a-video>
        </a-entity>

    </a-scene>

</body>
</html>
