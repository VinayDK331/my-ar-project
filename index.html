<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Free Video AR App</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <script>
        AFRAME.registerComponent('video-handler', {
            init: function () {
                var marker = this.el;
                var video = document.querySelector("#promoVideo");

                marker.addEventListener('targetFound', function () {
                    video.play();
                });

                marker.addEventListener('targetLost', function () {
                    video.pause();
                });
            }
        });
    </script>
</head>
<body>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="promoVideo" src="./promo.mp4" preload="auto" loop="true" response-type="arraybuffer" crossorigin="anonymous" muted></video>
        </a-assets>
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" video-handler>
            <a-video src="#promoVideo" position="0 0 0" width="1" height="0.56" rotation="0 0 0"></a-video>
        </a-entity>

    </a-scene>

</body>
</html>
